<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Sound Machine</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<h1>Random Sound Generator</h1>

<div class="sound-list">

    <div class="volume-control">

        <label for="masterVolume">
            Volume
        </label>

        <input
            type="range"
            id="masterVolume"
            min="0"
            max="100"
            value="100">

        <span id="masterVolumeValue">
            100%
        </span>

    </div>


    <div id="sound-list">
        <!-- Sound controls generated by JavaScript -->
    </div>


    <button id="toggleBtn">
        Start Generator
    </button>


</div>


<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<script src="script.js"></script>


</body>
</html>
